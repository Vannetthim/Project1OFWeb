<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - ចូលប្រើប្រាស់</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Khmer OS Battambang', 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
        }
        .active-orange {
            color: #ffc107 !important;
            font-weight: bold;
        }
        .btn-login-pink {
            background-color: #d81b60;
            color: white;
            transition: all 0.2s ease;
        }
        .btn-login-pink:hover {
            background-color: #ad1457;
            color: white;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999;
            margin: 20px 0;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }
        .auth-divider:not(:empty)::before { margin-right: .5em; }
        .auth-divider:not(:empty)::after { margin-left: .5em; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="index.html">
            ឆ្ងាញ់ៗ ខ្មែរហ្វូត
        </a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        HOME(ទំព័រដើម)
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">
                        ABOUT(អំពីហាង)
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="food.html">
                        FOOD(ម្ហូបអាហារ)
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="drink.html">
                        DRINK(ភេសជ្ជៈ)
                    </a>
                </li>

                <li class="nav-item me-lg-2">
                    <a class="nav-link" href="contact.html">
                        CONTACT(ទំនាក់ទំនង)
                    </a>
                </li>

                <li class="nav-item mt-2 mt-lg-0">
                    <a class="btn btn-warning w-100" href="auth.html">
                        ចូលប្រើ / ចុះឈ្មោះ
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

    <main class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
        <div class="card w-100 shadow p-4 p-sm-5 border-0 rounded-4 position-relative" style="max-width: 500px; background-color: #ffffff;">
            
            <a href="food.html" class="btn-close position-absolute top-0 end-0 m-3 text-decoration-none" aria-label="Close" style="font-size: 1.25rem;"></a>
            
            <div class="mb-4 text-center text-sm-start">
                <h1 class="fw-bold h2 text-dark mb-1">Welcome!</h1>
                <p class="text-muted mb-0">Sign up or log in to continue</p>
            </div>

            <div class="d-flex flex-column gap-2 mb-3">
                <button class="btn btn-primary d-flex align-items-center justify-content-center gap-2 fw-bold py-2.5 shadow-sm" style="background-color: #1877f2; border: none;">
                    <img src="https://img.icons8.com/?size=24&id=uLWV5A9vXIPu&format=png&color=000000" alt="Facebook" style="width: 24px; height: 24px;">
                    Continue with Facebook
                </button>
                
                <button class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2 fw-bold py-2.5 shadow-sm bg-white text-dark">
                    <img src="https://img.icons8.com/?size=24&id=17949&format=png&color=000000" alt="Google" style="width: 24px; height: 24px;">
                    Continue with Google
                </button>
                
                <button class="btn btn-dark d-flex align-items-center justify-content-center gap-2 fw-bold py-2.5 shadow-sm text-white" style="background-color: #000000; border: none;">
                    <img src="https://img.icons8.com/?size=24&id=9c6iBQaxdDK8&format=png&color=ffffff" alt="Apple" style="width: 24px; height: 24px;">
                    Continue with Apple
                </button>
            </div>

            <div class="auth-divider">
                <span class="px-2 text-muted small fw-semibold text-uppercase">or</span>
            </div>

            <div class="d-flex flex-column gap-2 mb-4">
                <a href="food.html" class="btn btn-login-pink fw-bold py-2.5 rounded-3 text-center">Log in</a>
                <a href="food.html" class="btn btn-outline-dark fw-bold py-2.5 rounded-3 text-center">Sign up</a>
            </div>

            <p class="text-muted small text-center mb-0 style-lh-base">
                By signing up, you agree to our <a href="#" class="text-decoration-none text-danger fw-semibold">Terms and Conditions</a> and <a href="#" class="text-decoration-none text-danger fw-semibold">Privacy Policy</a>.
            </p>
            
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
